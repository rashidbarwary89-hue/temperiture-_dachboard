<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Alarm Status Dashboard</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<style>
body { font-family: Arial; text-align:center; padding:2rem; background:#f5f7fa; }
.status { font-size:3rem; color:#ff5722; margin-top:2rem; }
</style>
</head>
<body>

<h1>حالة التنبيه</h1>
<div class="status" id="status">OFF</div>

<script>
const broker = '86f877dc676a4a38ae375ce047154e63.s1.eu.hivemq.cloud:8883';
const client = mqtt.connect(broker, {
  username: 'Rasheed',
  password: 'Rasheed1989',
  reconnectPeriod: 1000
});

const topicAlarm = 'rasheed';

client.on('connect', () => {
  console.log("Connected to HiveMQ Cloud");
  client.subscribe(topicAlarm);
});

client.on('message', (topic, message) => {
  if(topic === topicAlarm){
    document.getElementById("status").innerText = message.toString();
  }
});
</script>

</body>
</html>
