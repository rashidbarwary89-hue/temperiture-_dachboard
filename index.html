<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Alarm Status Dashboard</title>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

<div class="status" id="status">OFF</div>

<script>
const broker = 'wss://86f877dc676a4a38ae375ce047154e63.s1.eu.hivemq.cloud:8884/mqtt';
const client = mqtt.connect(broker, {
  username: 'Rasheed',
  password: 'Rasheed1989',
  reconnectPeriod: 1000
});

const topicAlarm = 'rasheed';

client.on('connect', () => {
  client.subscribe(topicAlarm);
});

client.on('message', (topic, message) => {
  if(topic === topicAlarm){
    document.getElementById("status").innerText = message.toString();
  }
});
</script>

</body>
</html>
